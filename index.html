<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Tetris da Vitoria</title>
    <style>
        /* Estilização Geral e Tema */
        body {
            background-color: #fce4ec; /* Rosa bem claro */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #4a148c; /* Roxo escuro */
        }

        h1 {
            margin-top: 10px;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 2px 2px #f8bbd0;
            color: #ad1457; /* Rosa escuro/Vinho */
        }

        #game-container {
            position: relative;
            display: flex;
            gap: 20px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 5px solid #f06292;
        }

        canvas {
            background-color: #2c3e50;
            border: 4px solid #8e24aa;
            display: block;
            border-radius: 5px;
        }

        #side-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 150px;
        }

        .stat-box {
            background: #f3e5f5;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 10px;
            border: 2px solid #ce93d8;
        }

        .stat-label {
            font-size: 0.9rem;
            font-weight: bold;
            display: block;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #7b1fa2;
        }

        #btn-start {
            padding: 15px 20px;
            font-size: 1.1rem;
            background-color: #ec407a;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            font-weight: bold;
            box-shadow: 0 4px #c2185b;
        }

        #btn-start:hover {
            background-color: #d81b60;
        }

        #btn-start:active {
            transform: translateY(4px);
            box-shadow: 0 0px #c2185b;
        }

        .controls-hint {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #880e4f;
            text-align: center;
            line-height: 1.4;
        }

        /* Overlay de Game Over */
        #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1>O Tetris da Vitoria</h1>

    <div id="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
        
        <div id="side-panel">
            <div class="stat-box">
                <span class="stat-label">PONTOS</span>
                <span id="score" class="stat-value">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">NÍVEL</span>
                <span id="level" class="stat-value">1</span>
            </div>
            
            <button id="btn-start">INICIAR JOGO</button>

            <div class="controls-hint">
                <b>CONTROLES:</b><br>
                ⬅️ ➡️ Mover<br>
                ⬆️ Girar<br>
                ⬇️ Cair rápido
            </div>
        </div>

        <div id="game-over">
            <h2 style="color: #ad1457;">Fim de Jogo!</h2>
            <p>Vitoria, você arrasou!</p>
            <button onclick="resetGame()" style="padding: 10px; cursor: pointer;">Tentar Novamente</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const btnStart = document.getElementById('btn-start');
        const gameOverScreen = document.getElementById('game-over');

        context.scale(20, 20); // Escala para facilitar o desenho (cada bloco tem 20px)

        // 1. Definição das Peças (Tetriminos)
        function createPiece(type) {
            if (type === 'I') {
                return [
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                ];
            } else if (type === 'L') {
                return [
                    [0, 2, 0],
                    [0, 2, 0],
                    [0, 2, 2],
                ];
            } else if (type === 'J') {
                return [
                    [0, 3, 0],
                    [0, 3, 0],
                    [3, 3, 0],
                ];
            } else if (type === 'O') {
                return [
                    [4, 4],
                    [4, 4],
                ];
            } else if (type === 'Z') {
                return [
                    [5, 5, 0],
                    [0, 5, 5],
                    [0, 0, 0],
                ];
            } else if (type === 'S') {
                return [
                    [0, 6, 6],
                    [6, 6, 0],
                    [0, 0, 0],
                ];
            } else if (type === 'T') {
                return [
                    [0, 7, 0],
                    [7, 7, 7],
                    [0, 0, 0],
                ];
            }
        }

        const colors = [
            null,
            '#FF0D72', // Rosa Choque (I)
            '#0DC2FF', // Azul (L)
            '#0DFF72', // Verde (J)
            '#F538FF', // Roxo (O)
            '#FF8E0D', // Laranja (Z)
            '#FFE138', // Amarelo (S)
            '#3877FF', // Azul Royal (T)
        ];

        // 2. Lógica de Colisão e Movimento
        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;

                player.score += rowCount * 10;
                rowCount *= 2;
                
                // Aumentar nível a cada 50 pontos
                player.level = Math.floor(player.score / 50) + 1;
                dropInterval = 1000 - (player.level * 50);
                if (dropInterval < 100) dropInterval = 100;
            }
            updateScore();
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        function draw() {
            // Limpa o canvas
            context.fillStyle = '#2c3e50';
            context.fillRect(0, 0, canvas.width, canvas.height);

            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        // Sombra do bloco
                        context.fillStyle = 'rgba(0,0,0,0.3)';
                        context.fillRect(x + offset.x + 0.05, y + offset.y + 0.05, 0.9, 0.9);
                        
                        // Bloco principal
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 0.9, 0.9);
                        
                        // Brilho para parecer 3D
                        context.fillStyle = 'rgba(255,255,255,0.2)';
                        context.fillRect(x + offset.x, y + offset.y, 0.9, 0.1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [
                        matrix[x][y],
                        matrix[y][x],
                    ] = [
                        matrix[y][x],
                        matrix[x][y],
                    ];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) -
                           (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                // FIM DE JOGO
                gameOver = true;
                gameOverScreen.style.display = 'flex';
                cancelAnimationFrame(animationId);
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let gameOver = false;
        let animationId;

        function update(time = 0) {
            if (gameOver) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            animationId = requestAnimationFrame(update);
        }

        function updateScore() {
            scoreElement.innerText = player.score;
            levelElement.innerText = player.level;
        }

        const arena = createMatrix(12, 20);

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
            level: 1,
        };

        // 3. Controles por Teclado
        document.addEventListener('keydown', event => {
            if (gameOver) return;
            
            if (event.keyCode === 37) { // Esquerda
                playerMove(-1);
            } else if (event.keyCode === 39) { // Direita
                playerMove(1);
            } else if (event.keyCode === 40) { // Baixo
                playerDrop();
            } else if (event.keyCode === 38) { // Cima (Girar)
                playerRotate(1);
            }
        });

        function resetGame() {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            player.level = 1;
            dropInterval = 1000;
            gameOver = false;
            gameOverScreen.style.display = 'none';
            updateScore();
            playerReset();
            update();
        }

        btnStart.addEventListener('click', () => {
            if (animationId) cancelAnimationFrame(animationId);
            resetGame();
            btnStart.innerText = "REINICIAR";
        });

        // Inicializar tela
        draw();
    </script>
</body>
</html>
