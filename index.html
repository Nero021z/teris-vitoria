<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris da Vitoria - Mobile</title>
    <style>
        :root {
            --primary: #ff7eb9;
            --secondary: #7afcff;
            --bg: #1a1a2e;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Bloqueia gestos do navegador */
        }

        h1 { font-size: 1.2rem; margin: 10px 0; color: var(--primary); }

        #game-container {
            position: relative;
            border: 3px solid var(--primary);
            background: #000;
            box-shadow: 0 0 15px rgba(255, 126, 185, 0.4);
        }

        canvas { display: block; }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin: 10px 0;
            font-weight: bold;
        }

        /* Área de Controles Mobile */
        .controls-area {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px 0;
            margin-top: auto;
            margin-bottom: 20px;
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 10px;
        }

        .action-pad {
            display: flex;
            align-items: center;
        }

        .btn-mobile {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 0 var(--primary);
        }

        .btn-mobile:active {
            transform: translateY(4px);
            box-shadow: none;
            background: var(--primary);
        }

        .btn-rotate {
            width: 85px;
            height: 85px;
            background: var(--secondary);
            border-color: #00d4ff;
            color: #1a1a2e;
            box-shadow: 0 4px 0 #00d4ff;
            font-weight: bold;
        }

        .btn-rotate:active { box-shadow: none; background: #00d4ff; }

        .label { font-size: 0.6rem; color: var(--secondary); display: block; }
    </style>
</head>
<body>

    <h1>🎮 O Tetris da Vitoria</h1>

    <div class="stats-bar">
        <div><span class="label">PONTOS</span><span id="score">0</span></div>
        <div><span class="label">LINHAS</span><span id="lines">0</span></div>
    </div>

    <div id="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
    </div>

    <div class="controls-area">
        <div class="d-pad">
            <div class="btn-mobile" id="left">⬅️</div>
            <div class="btn-mobile" id="down">⬇️</div>
            <div class="btn-mobile" id="right">➡️</div>
        </div>

        <div class="action-pad">
            <div class="btn-mobile btn-rotate" id="rotate">GIRAR</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        context.scale(20, 20);

        // Lógica Principal (Simplificada para performance mobile)
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.strokeStyle = '#000';
                        context.lineWidth = 0.05;
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function rotate(matrix) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            matrix.forEach(row => row.reverse());
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                player.lines++;
                rowCount *= 2;
            }
            document.getElementById('score').innerText = player.score;
            document.getElementById('lines').innerText = player.lines;
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function playerRotate() {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix); // Volta se não der
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                player.lines = 0;
                document.getElementById('score').innerText = 0;
                document.getElementById('lines').innerText = 0;
            }
        }

        const colors = [null, '#ff7eb9', '#7afcff', '#feeb7d', '#6bff84', '#a29bfe', '#ff9f43', '#ff4d4d'];
        const arena = createMatrix(12, 20);
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0, lines: 0 };

        // Controles de Toque (Mobile)
        const handleTouch = (id, action) => {
            document.getElementById(id).addEventListener('touchstart', (e) => {
                e.preventDefault();
                action();
            });
        };

        handleTouch('left', () => playerMove(-1));
        handleTouch('right', () => playerMove(1));
        handleTouch('down', () => playerDrop());
        handleTouch('rotate', () => playerRotate());

        // Teclado (PC)
        document.addEventListener('keydown', e => {
            if (e.keyCode === 37) playerMove(-1);
            if (e.keyCode === 39) playerMove(1);
            if (e.keyCode === 40) playerDrop();
            if (e.keyCode === 38) playerRotate();
        });

        let dropCounter = 0;
        let lastTime = 0;
        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > 1000) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        playerReset();
        update();
    </script>
</body>
</html>
